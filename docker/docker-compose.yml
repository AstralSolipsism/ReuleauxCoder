services:
  labrastro-host:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: labrastro-host:test
    container_name: labrastro-host
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8765:8765"
    volumes:
      - ../.rcoder:/app/.rcoder
    tty: true
    stdin_open: true
