services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-labrastro}
      POSTGRES_USER: ${POSTGRES_USER:-labrastro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-labrastro}
    volumes:
      - labrastro-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-labrastro} -d ${POSTGRES_DB:-labrastro}"]
      interval: 5s
      timeout: 5s
      retries: 20

  labrastro-host:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      LABRASTRO_DATABASE_URL: postgresql://${POSTGRES_USER:-labrastro}:${POSTGRES_PASSWORD:-labrastro}@postgres:5432/${POSTGRES_DB:-labrastro}

volumes:
  labrastro-postgres:
